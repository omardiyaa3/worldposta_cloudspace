name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Download WebView2 bootstrapper
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "build/windows/x64/runner/Release/MicrosoftEdgeWebview2Setup.exe"

      - name: Create installer archive
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath CloudSpace-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudSpace-Windows
          path: build/windows/x64/runner/Release/CloudSpace-Windows.zip
