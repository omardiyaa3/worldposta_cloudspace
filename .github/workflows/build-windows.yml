name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle VC++ runtime DLLs and Media Foundation DLLs
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $sysDir = "C:\Windows\System32"
          # VC++ runtime
          $dlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll", "msvcp140_1.dll")
          foreach ($dll in $dlls) {
            $src = Join-Path $sysDir $dll
            if (Test-Path $src) {
              Copy-Item $src $releaseDir -Force
              Write-Host "Copied $dll"
            }
          }
          # Media Foundation DLLs (needed by audioplayers; missing on Windows N/KN)
          $mfDlls = @("MFPlat.DLL", "MFReadWrite.dll", "MF.dll")
          foreach ($dll in $mfDlls) {
            $src = Join-Path $sysDir $dll
            if (Test-Path $src) {
              Copy-Item $src $releaseDir -Force
              Write-Host "Copied $dll"
            } else {
              Write-Host "WARNING: $dll not found on build machine"
            }
          }

      - name: Download prerequisites
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "build/windows/x64/runner/Release/vc_redist.x64.exe"
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "build/windows/x64/runner/Release/MicrosoftEdgeWebview2Setup.exe"

      - name: Create Inno Setup script
        run: |
          @"
          [Setup]
          AppName=CloudSpace
          AppVersion=1.0.0
          AppPublisher=WorldPosta
          DefaultDirName={autopf}\CloudSpace
          DefaultGroupName=CloudSpace
          OutputDir=.
          OutputBaseFilename=CloudSpace-Setup
          Compression=lzma2
          SolidCompression=yes
          SetupIconFile=windows\runner\resources\app_icon.ico
          UninstallDisplayIcon={app}\CloudSpace.exe
          UninstallDisplayName=CloudSpace
          CloseApplications=force
          CloseApplicationsFilter=CloudSpace.exe
          RestartApplications=no

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion

          [Icons]
          Name: "{group}\CloudSpace"; Filename: "{app}\CloudSpace.exe"
          Name: "{autodesktop}\CloudSpace"; Filename: "{app}\CloudSpace.exe"
          Name: "{userstartup}\CloudSpace"; Filename: "{app}\CloudSpace.exe"; Parameters: "--minimized"

          [Run]
          Filename: "{app}\vc_redist.x64.exe"; Parameters: "/install /quiet /norestart"; StatusMsg: "Installing Visual C++ Runtime..."; Flags: waituntilterminated skipifsilent; Check: not VCRedistInstalled
          Filename: "{app}\MicrosoftEdgeWebview2Setup.exe"; Parameters: "/silent /install"; StatusMsg: "Installing WebView2 Runtime..."; Flags: waituntilterminated skipifsilent; Check: not WebView2Installed
          Filename: "{app}\CloudSpace.exe"; Description: "Launch CloudSpace"; Flags: nowait postinstall skipifsilent

          [Code]
          procedure CurStepChanged(CurStep: TSetupStep);
          var
            OldPath, NewPath: String;
          begin
            if CurStep = ssPostInstall then
            begin
              OldPath := ExpandConstant('{app}\unins000.exe');
              NewPath := ExpandConstant('{app}\CloudSpace Uninstaller.exe');
              if FileExists(OldPath) then
                RenameFile(OldPath, NewPath);
              OldPath := ExpandConstant('{app}\unins000.dat');
              NewPath := ExpandConstant('{app}\CloudSpace Uninstaller.dat');
              if FileExists(OldPath) then
                RenameFile(OldPath, NewPath);
            end;
          end;

          function VCRedistInstalled: Boolean;
          begin
            Result := FileExists(ExpandConstant('{sys}\msvcp140.dll'));
          end;

          function WebView2Installed: Boolean;
          var
            Version: String;
          begin
            Result := RegQueryStringValue(HKLM, 'SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}', 'pv', Version) or
                      RegQueryStringValue(HKCU, 'SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}', 'pv', Version);
          end;
          "@ | Out-File -FilePath "installer.iss" -Encoding UTF8

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CloudSpace-Windows-Setup
          path: CloudSpace-Setup.exe

      - name: Upload unsigned exe (for manual signing)
        uses: actions/upload-artifact@v4
        with:
          name: CloudSpace-Unsigned-Exe
          path: build/windows/x64/runner/Release/CloudSpace.exe
