name: cloudspace_app
description: "CloudSpace - Your cloud, your way."
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  xml: ^6.5.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.0
  url_launcher: ^6.3.0
  provider: ^6.1.0
  mime: ^2.0.0
  uuid: ^4.5.1
  webview_flutter: ^4.10.0
  syncfusion_flutter_pdfviewer: ^33.1.45
  audioplayers: ^6.6.0
  spreadsheet_decoder: ^2.3.0
  desktop_drop: ^0.7.0
  open_filex: ^4.7.0
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_flat.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  macos:
    generate: true
    image_path: "assets/logo_flat.png"

flutter_native_splash:
  color: "#F8FAFC"
  image: "assets/logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
